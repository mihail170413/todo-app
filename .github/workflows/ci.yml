name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Build the application inside Drogon Docker container
      run: |
        docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
          drogonframework/drogon:latest \
          bash -c "mkdir -p build && cd build && cmake .. && make -j\$(nproc)"

    - name: Functional test
      run: |
        export DB_HOST=localhost DB_NAME=${{ env.DB_NAME }} DB_USER=${{ env.DB_USER }} DB_PASSWORD=${{ env.DB_PASSWORD }}
        ${{ github.workspace }}/build/todo_app &
        APP_PID=$!
        sleep 5
        curl -f http://localhost:5000/health
        curl -X POST -H "Content-Type: application/json" -d '{"title":"CI test"}' http://localhost:5000/api/tasks
        curl -s http://localhost:5000/api/tasks | grep "CI test"
        kill $APP_PID
