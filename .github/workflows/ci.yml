name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Build the application inside Drogon Docker container
      run: |
        docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
          drogonframework/drogon:latest \
          bash -c "mkdir -p build && cd build && cmake .. && make -j\$(nproc)"

    - name: Run functional test (use service network)
      env:
        NETWORK: ${{ job.services.postgres.network }}
      run: |
        # Запускаем контейнер в той же сети, где postgres, и сразу генерируем config.json
        docker run -d --name todo-test \
          --network "$NETWORK" \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          -e DB_HOST=postgres \
          -e DB_NAME=${{ env.DB_NAME }} \
          -e DB_USER=${{ env.DB_USER }} \
          -e DB_PASSWORD=${{ env.DB_PASSWORD }} \
          drogonframework/drogon:latest \
          bash -c "envsubst < config.json.template > config.json && exec ./build/todo_app"

        sleep 5
        echo "=== Container logs ==="
        docker logs todo-test

        # Все тесты выполняем внутри контейнера, где есть все библиотеки и сеть
        echo "=== Health check ==="
        docker exec todo-test curl -f http://localhost:5000/health

        echo "=== Create task ==="
        docker exec todo-test curl -X POST -H "Content-Type: application/json" \
          -d '{"title":"CI test"}' http://localhost:5000/api/tasks

        echo "=== Verify task ==="
        docker exec todo-test curl -s http://localhost:5000/api/tasks | grep "CI test"

        docker stop todo-test && docker rm todo-test
