name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Build the application inside Drogon Docker container
      run: |
        docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
          drogonframework/drogon:latest \
          bash -c "mkdir -p build && cd build && cmake .. && make -j\$(nproc)"

    - name: Generate real config.json from template
      run: |
        # Подставляем переменные окружения в шаблон
        envsubst < config.json.template > config.json
        cat config.json  # для отладки

    - name: Run functional test inside Drogon container
      run: |
        # Запускаем приложение в контейнере Drogon с доступом к сети хоста
        docker run -d --name todo-test \
          --network host \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          drogonframework/drogon:latest \
          ./build/todo_app
        
        # Ждём запуска
        sleep 5
        
        # Проверяем здоровье
        curl -f http://localhost:5000/health
        
        # Создаём задачу
        curl -X POST -H "Content-Type: application/json" \
          -d '{"title":"CI test"}' \
          http://localhost:5000/api/tasks
        
        # Проверяем, что задача создалась
        curl -s http://localhost:5000/api/tasks | grep "CI test"
        
        # Останавливаем и удаляем контейнер
        docker stop todo-test && docker rm todo-test
